<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background with WhatsApp-inspired gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25D366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#128C7E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DCF8C6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b9e88a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Main card -->
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="white" fill-opacity="0.95"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="url(#cardGradient)" fill-opacity="0.3"/>
  
  <!-- Logo/Icon -->
  <circle cx="150" cy="165" r="50" fill="#25D366"/>
  <text x="150" y="185" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="white">💬</text>
  
  <!-- Title -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#075E54">DevRelay</text>
  
  <!-- Subtitle -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="36" text-anchor="middle" fill="#128C7E">Free Real-time Chat & File Sharing</text>
  
  <!-- Features -->
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#666">
    • No Login Required • Real-time Messaging • File Sharing • QR Code Rooms
  </text>
  
  <!-- Chat bubbles illustration -->
  <g transform="translate(300, 400)">
    <!-- Received message bubble -->
    <rect x="0" y="0" width="300" height="60" rx="15" fill="#DCF8C6"/>
    <text x="150" y="35" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#333">Hello! Welcome to DevRelay! 🚀</text>
    
    <!-- Sent message bubble -->
    <rect x="350" y="80" width="250" height="60" rx="15" fill="#25D366"/>
    <text x="475" y="115" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="white">Thanks! This is awesome! 💯</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#25D366">devrelay.onrender.com</text>
</svg>
